# Render Blueprint — сайт + PostgreSQL в одном клике
# https://render.com/docs/blueprint-spec
databases:
  - name: inclinic-db
    plan: free
    databaseName: clinic
    user: clinic

services:
  - type: web
    name: inclinic
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inclinic-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: inclinic-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_SEC
        value: "1800"
      - key: JWT_REFRESH_TTL_SEC
        value: "604800"
      - key: DEFAULT_CLINIC_SLUG
        value: default
      - key: NEXT_PUBLIC_CLINIC_NAME
        value: InClinic
      - key: NEXT_PUBLIC_CLINIC_PHONE
        value: "+992 00 000 00 00"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_PUBLIC_URL
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
